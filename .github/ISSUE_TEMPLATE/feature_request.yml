name: Feature request
about: Request a new product feature
labels: ["type:feature", "priority:P1"]
title: "feat: "
body:
  - type: textarea
    attributes:
      label: Problem statement
      description: What business or technical pain does this solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: Describe the expected behavior and scope.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Acceptance criteria
      description: List measurable outcomes.
    validations:
      required: true
