services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: automation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d/01-migrations:ro
      - ./apps/api/seed:/docker-entrypoint-initdb.d/02-seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d automation"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.6.1
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:4.2.4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./infra/otel/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "8889:8889"

  prometheus:
    image: prom/prometheus:v3.10.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.4.1
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: server
    environment:
      APP_ENV: local
      HTTP_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/automation?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE: workflow-actions
      RABBITMQ_DLQ: workflow-actions-dlq
      MAX_RETRIES: 3
      IDEMPOTENCY_TTL_HOURS: 24
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      ALLOWED_ORIGINS: http://localhost:3000
      WEBHOOK_SIGNATURE_HEADER: X-Signature
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: worker
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/automation?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE: workflow-actions
      RABBITMQ_DLQ: workflow-actions-dlq
      OUTGOING_TIMEOUT_MS: 8000
      MAX_RETRIES: 3
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
